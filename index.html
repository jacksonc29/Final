<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAKE IT OUT THE UNDERGROUND // PRESTIGE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container" style="display: flex; gap: 30px; font-family: sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto;">
        
        <aside class="shop-panel left-shop" style="width: 320px; flex-shrink: 0;">
            <div class="shop-header" style="font-weight: bold; background: #eee; padding: 10px; border-radius: 4px; text-align: center;">HIRE TEAM (Click Boosts)</div>
            <div id="staff-items"></div> 
            
            <div class="shop-header" style="font-weight: bold; background: #eee; padding: 10px; border-radius: 4px; text-align: center; margin-top: 25px;">SIGN ARTISTS (Passive Income)</div>
            <div id="shop-items"></div> 
        </aside>

        <div class="main-area" style="flex-grow: 1; text-align: center;">
            <div class="logo" style="font-size: 28px; font-weight: bold; margin-bottom: 25px; letter-spacing: 1px;">MAKE IT OUT THE UNDERGROUND</div>
            
            <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 20px;">
                <div class="stat-box" style="background: #f9f9f9; padding: 10px 20px; border-radius: 6px; border: 1px solid #eee;">
                    <span class="label" style="font-size: 11px; color: #666; display: block;">TOTAL_PLAYS</span>
                    <span id="play-count" style="font-size: 24px; font-weight: bold;">0</span>
                </div>
                
                <div class="stat-box" style="background: #f9f9f9; padding: 10px 20px; border-radius: 6px; border: 1px solid #eee;">
                    <span class="label" style="font-size: 11px; color: #666; display: block;">PLAYS_PER_SECOND</span>
                    <span id="pps-count" style="font-size: 24px; font-weight: bold;">0</span>
                </div>

                <div class="stat-box" style="background: #f9f9f9; padding: 10px 20px; border-radius: 6px; border: 1px solid #eee;">
                    <span class="label" style="font-size: 11px; color: #666; display: block;">STREAMS_PER_CLICK</span>
                    <span id="spc-count" style="font-size: 24px; font-weight: bold;">1</span>
                </div>
            </div>
            
            <main class="click-area" style="margin: 40px 0;">
                <button id="main-clicker" style="padding: 20px 40px; font-size: 20px; font-weight: bold; cursor: pointer; border-radius: 8px; border: 2px solid #000; background: #fff; transition: background 0.2s;">
                    <span class="click-text">RELEASE SINGLE</span>
                </button>
            </main>

            <div id="charts-container" style="margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px;">
                <h2>🔥 The Hot 100</h2>
                <div id="chart-list" style="max-width: 500px; margin: 0 auto;"></div>
            </div>

            <div id="console-log" style="text-align: left; background: #000; color: #0f0; padding: 15px; font-family: monospace; height: 120px; overflow-y: auto; margin-top: 30px; border-radius: 6px; font-size: 13px; line-height: 1.5;"></div>
        </div>
        
    </div>

    <script src="game.js"></script>
</body>
</html>
